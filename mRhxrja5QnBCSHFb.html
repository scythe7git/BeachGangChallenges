<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beach Gang Challenges</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 40px;
      font-size: 1.1rem;
    }

    .section-title {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .leaderboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }

    .leaderboard-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .leaderboard-card:hover {
      transform: translateY(-5px);
    }

    .rank {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .player-name {
      font-size: 1.6rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .points {
      font-size: 2.2rem;
      color: #facc15;
      font-weight: bold;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .task {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 25px;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    .task-name {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .task-points {
      background: #facc15;
      color: black;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
    }

    .task-description {
      color: #cbd5e1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .completion-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .completion-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .completed-by {
      font-weight: bold;
    }

    .date {
      color: #94a3b8;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2.2rem;
      }

      .task-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .completion-item {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>☀️ Beach Gang Challenges</h1>
    <p class="subtitle">
      The crazier the task, the more points you get. Message Joa with proof of completion if you complete a task. <br><br>MULTIPLE PEOPLE CAN COMPLETE A TASK IF IT'S A GROUP TASK!
    </p>

    <h2 class="section-title">🏆 Leaderboard</h2>

    <div class="leaderboard" id="leaderboard">
      <!-- Leaderboard generated by JavaScript -->
    </div>

    <h2 class="section-title">✅ Challenges</h2>

    <div class="todo-list" id="todoList">
      <!-- Tasks generated by JavaScript -->
    </div>

    <div class="footer">
      Beach Gang Challenges
    </div>
  </div>

  <script>
    if (sessionStorage.getItem("loggedIn") !== "true") {
      window.location.href = "index.html";
    }
    // ==========================================
    // EDIT EVERYTHING BELOW THIS LINE
    // ==========================================

    const players = [
      {
        name: "Joa",
        points: 0
      },
      {
        name: "Jamesen",
        points: 0
      },
      {
        name: "Charlie",
        points: 0
      },
      {
        name: "Aaliyah",
        points: 0
      },
      {
        name: "Nakcha",
        points: 0
      },
      {
        name: "Sam",
        points: 0
      },
      {
        name: "Victoria",
        points: 0
      },
      {
        name: "Amy",
        points: 0
      },
      {
        name: "Ellie",
        points: 0
      }
    ];

    const tasks = [
      // {
      //   title: "Road Trip to Somewhere Random",
      //   points: 50,
      //   description: "Drive somewhere completely random and spend the day there.",
      //   completions: [
      //     {
      //       name: "Alex",
      //       date: "May 20, 2026"
      //     },
      //     {
      //       name: "Jake",
      //       date: "May 22, 2026"
      //     }
      //   ]
      // },
      // {
      //   title: "24 Hour Challenge",
      //   points: 100,
      //   description: "Stay awake for 24 hours and document the experience.",
      //   completions: [
      //     {
      //       name: "Chris",
      //       date: "May 28, 2026"
      //     }
      //   ]
      // },
      {
        title: "Feet Finder",
        points: 30,
        description: "Make the most money selling your own feet pics online.",
        completions: []
      },      {
        title: "Trippin' Out",
        points: 50,
        description: "Do LSD or magic mushrooms.",
        completions: []
      },      {
        title: "Cat Cafe",
        points: 5,
        description: "Go to the cat cafe in Lower Hutt.",
        completions: []
      },      {
        title: "Visiting Gang",
        points: 5,
        description: "Go to Charlie's, Joa's, and Sam's houses.",
        completions: []
      },      {
        title: "Ghost Busters",
        points: 15,
        description: "Go ghost hunting.",
        completions: []
      },      {
        title: "Time Skip",
        points: 25,
        description: "Get blackout drunk and wake up in a crazy pace.",
        completions: []
      },      {
        title: "Better Out Then In",
        points: 20,
        description: "First one to vomit while drinking.",
        completions: []
      }
    ];

    // ==========================================
    // WEBSITE LOGIC
    // ==========================================

    const leaderboard = document.getElementById("leaderboard");
    const todoList = document.getElementById("todoList");

    // Sort players by points
    players.sort((a, b) => b.points - a.points);

    // Generate leaderboard
    players.forEach((player, index) => {
      const card = document.createElement("div");
      card.classList.add("leaderboard-card");

      let medal = "";

      if (index === 0) medal = "🥇";
      else if (index === 1) medal = "🥈";
      else if (index === 2) medal = "🥉";

      card.innerHTML = `
        <div class="rank">${medal} Rank #${index + 1}</div>
        <div class="player-name">${player.name}</div>
        <div class="points">${player.points} pts</div>
      `;

      leaderboard.appendChild(card);
    });

    // Generate tasks
    tasks.forEach(task => {
      const taskElement = document.createElement("div");
      taskElement.classList.add("task");

      let completionHTML = "";

      if (task.completions.length === 0) {
        completionHTML = `
          <div class="completion-item">
            <span>No one has completed this yet.</span>
          </div>
        `;
      } else {
        task.completions.forEach(completion => {
          completionHTML += `
            <div class="completion-item">
              <span class="completed-by">${completion.name}</span>
              <span class="date">${completion.date}</span>
            </div>
          `;
        });
      }

      taskElement.innerHTML = `
        <div class="task-header">
          <div class="task-name">${task.title}</div>
          <div class="task-points">${task.points} Points</div>
        </div>

        <div class="task-description">
          ${task.description}
        </div>

        <div class="completion-list">
          ${completionHTML}
        </div>
      `;

      todoList.appendChild(taskElement);
    });
  </script>
</body>
</html>
